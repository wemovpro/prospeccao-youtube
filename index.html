<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📺 Prospecção de Canais — YouTube</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --surface2: #222536;
      --border:   #2e3150;
      --accent:   #6c63ff;
      --text:     #e4e6f0;
      --muted:    #7b7f9e;
      --radius:   12px;
      --shadow:   0 4px 24px rgba(0,0,0,.45);
    }
    html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }

    /* ── Header ── */
    header {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 24px; background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    header .logo { font-size: 1.4rem; }
    header h1 { font-size: 1.1rem; font-weight: 700; }
    header h1 span { color: var(--accent); }
    .header-right { margin-left: auto; display: flex; gap: 10px; align-items: center; }

    .stats-bar { display: flex; gap: 6px; }
    .stat-chip {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 12px; font-size: .77rem; color: var(--muted);
    }
    .stat-chip strong { color: var(--text); }

    /* ── DB status ── */
    #dbStatus {
      display: flex; align-items: center; gap: 6px;
      font-size: .75rem; color: var(--muted);
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 12px;
    }
    #dbDot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #555; transition: background .3s;
    }
    #dbDot.ok  { background: #22c55e; }
    #dbDot.err { background: #ef4444; }
    #dbDot.loading { background: #f59e0b; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer;
      font-size: .84rem; font-weight: 600; transition: opacity .15s, transform .1s;
    }
    .btn:hover { opacity: .88; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ghost   { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

    /* ── Search ── */
    .search-wrap { position: relative; }
    .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
    #search {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; padding: 7px 12px 7px 34px;
      font-size: .84rem; width: 190px; outline: none; transition: border-color .2s;
    }
    #search:focus { border-color: var(--accent); }

    /* ── Board ── */
    #board {
      display: flex; gap: 14px; padding: 20px 22px;
      overflow-x: auto; min-height: calc(100vh - 62px);
      align-items: flex-start;
    }

    /* ── Column ── */
    .column {
      flex: 0 0 258px; background: var(--surface);
      border-radius: var(--radius); border: 1px solid var(--border);
      display: flex; flex-direction: column; max-height: calc(100vh - 102px);
    }
    .col-header {
      padding: 13px 13px 9px;
      display: flex; align-items: center; gap: 8px;
      border-bottom: 1px solid var(--border);
    }
    .col-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .col-title { font-size: .86rem; font-weight: 700; flex: 1; }
    .col-count {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 1px 9px; font-size: .72rem; color: var(--muted);
    }
    .col-body {
      padding: 9px 9px 5px; overflow-y: auto; flex: 1;
      display: flex; flex-direction: column; gap: 8px;
    }
    .col-body::-webkit-scrollbar { width: 4px; }
    .col-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .col-add { padding: 7px 9px 11px; }
    .col-add button {
      width: 100%; background: transparent; border: 1px dashed var(--border);
      color: var(--muted); border-radius: 8px; padding: 7px;
      cursor: pointer; font-size: .79rem; transition: all .15s;
      display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .col-add button:hover { border-color: var(--accent); color: var(--accent); background: rgba(108,99,255,.05); }

    /* ── Card ── */
    .card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px; cursor: grab;
      transition: box-shadow .15s, transform .15s, border-color .15s;
    }
    .card:active { cursor: grabbing; }
    .card:hover  { box-shadow: var(--shadow); border-color: var(--accent); transform: translateY(-1px); }
    .card.dragging { opacity: .4; transform: rotate(1.5deg) scale(.97); }

    .card-top { display: flex; align-items: flex-start; gap: 9px; margin-bottom: 8px; }
    .card-thumb {
      width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: .84rem; font-weight: 700; overflow: hidden;
    }
    .card-info { flex: 1; min-width: 0; }
    .card-name { font-size: .86rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-url  { font-size: .72rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-url a { color: var(--muted); text-decoration: none; }
    .card-url a:hover { color: var(--accent); }

    .card-actions { display: flex; gap: 4px; opacity: 0; transition: opacity .15s; }
    .card:hover .card-actions { opacity: 1; }
    .card-actions button {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; width: 26px; height: 26px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: .74rem;
      color: var(--muted); transition: all .15s;
    }
    .card-actions button:hover { border-color: var(--accent); color: var(--accent); }

    .card-meta { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 2px; }
    .badge { border-radius: 20px; padding: 2px 9px; font-size: .69rem; font-weight: 600; border: 1px solid transparent; }
    .badge-niche      { background: rgba(108,99,255,.15); color: #a78bfa; border-color: rgba(168,139,250,.2); }
    .badge-subs       { background: rgba(6,182,212,.1);   color: #22d3ee; border-color: rgba(6,182,212,.2); }
    .badge-prio-alta  { background: rgba(239,68,68,.12);  color: #f87171; border-color: rgba(239,68,68,.2); }
    .badge-prio-media { background: rgba(245,158,11,.12); color: #fbbf24; border-color: rgba(245,158,11,.2); }
    .badge-prio-baixa { background: rgba(34,197,94,.1);   color: #4ade80; border-color: rgba(34,197,94,.2); }

    .card-notes {
      margin-top: 8px; font-size: .74rem; color: var(--muted);
      border-top: 1px solid var(--border); padding-top: 7px; line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }

    /* ── Card Script ── */
    .card-script { margin-top: 8px; border-top: 1px solid var(--border); padding-top: 8px; }
    .card-script-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
    .card-script-label { font-size: .67rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .6px; }
    .card-script-copy {
      background: transparent; border: 1px solid var(--border);
      border-radius: 5px; padding: 2px 8px; font-size: .69rem;
      color: var(--muted); cursor: pointer; transition: all .15s;
      display: flex; align-items: center; gap: 3px; font-family: inherit;
    }
    .card-script-copy:hover  { border-color: var(--accent); color: var(--accent); background: rgba(108,99,255,.05); }
    .card-script-copy.copied { border-color: #22c55e; color: #4ade80; background: rgba(34,197,94,.08); }
    .card-script-text {
      font-size: .72rem; color: var(--muted); line-height: 1.55; white-space: pre-wrap;
      display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-script-expand { font-size: .67rem; color: var(--accent); cursor: pointer; margin-top: 3px; background: none; border: none; padding: 0; font-family: inherit; }
    .card-script-expand:hover { text-decoration: underline; }

    .card-date { margin-top: 8px; font-size: .69rem; color: var(--border); display: flex; align-items: center; gap: 4px; }

    /* ── Drop placeholder ── */
    .drop-placeholder { border: 2px dashed var(--accent); border-radius: 10px; min-height: 58px; background: rgba(108,99,255,.05); }

    /* ── Empty state ── */
    .empty-state { text-align: center; padding: 20px 10px; color: var(--muted); font-size: .79rem; line-height: 1.5; }
    .empty-state span { font-size: 1.5rem; display: block; margin-bottom: 6px; opacity: .5; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.65);
      display: flex; align-items: center; justify-content: center;
      z-index: 999; backdrop-filter: blur(4px);
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; width: min(560px, 95vw); padding: 26px;
      box-shadow: var(--shadow); transform: translateY(16px); transition: transform .2s;
      max-height: 90vh; overflow-y: auto;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal h2 { font-size: 1.05rem; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 13px; }
    .form-grid .full { grid-column: 1 / -1; }
    .field label { display: block; font-size: .76rem; color: var(--muted); margin-bottom: 5px; font-weight: 600; }
    .field input, .field select, .field textarea {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; padding: 9px 12px;
      font-size: .86rem; outline: none; transition: border-color .2s; font-family: inherit;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
    .field textarea { resize: vertical; min-height: 70px; }
    .field textarea.script-area { min-height: 155px; font-size: .81rem; line-height: 1.6; }
    .field select option { background: var(--surface2); }
    .field-divider { grid-column: 1 / -1; border: none; border-top: 1px solid var(--border); margin: 2px 0; }

    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 22px; right: 22px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 11px 17px;
      font-size: .84rem; box-shadow: var(--shadow);
      transform: translateY(80px); opacity: 0;
      transition: all .3s; z-index: 9999;
      display: flex; align-items: center; gap: 10px;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success .ti::before { content: '✅'; }
    #toast.error   .ti::before { content: '❌'; }
    #toast.info    .ti::before { content: 'ℹ️'; }

    /* ── Loading overlay ── */
    #loadingOverlay {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; z-index: 9999; transition: opacity .4s;
    }
    #loadingOverlay.hide { opacity: 0; pointer-events: none; }
    .spinner {
      width: 36px; height: 36px; border-radius: 50%;
      border: 3px solid var(--border); border-top-color: var(--accent);
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loadingOverlay p { font-size: .9rem; color: var(--muted); }

    ::-webkit-scrollbar { height: 6px; width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>

// ─────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────
let cards = [];
let dragCard = null;
let searchQuery = '';

// ─────────────────────────────────────────
//  DB HELPERS
// ─────────────────────────────────────────
async function dbLoad() {
  const { data, error } = await sb.from('channels').select('*').order('created', { ascending: true });
  if (error) throw error;
  return data || [];
}

async function dbUpsert(card) {
  const { error } = await sb.from('channels').upsert(card);
  if (error) throw error;
}

async function dbDelete(id) {
  const { error } = await sb.from('channels').delete().eq('id', id);
  if (error) throw error;
}

function setDbStatus(state, label) {
  const dot = document.getElementById('dbDot');
  const lbl = document.getElementById('dbLabel');
  dot.className = state;
  lbl.textContent = label;
}

// ─────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────
async function init() {
  setDbStatus('loading', 'Conectando…');
  try {
    cards = await dbLoad();
    if (cards.length === 0) {
      // First run — seed the database
      setDbStatus('loading', 'Inserindo dados…');
      const { error } = await sb.from('channels').insert(SEEDS);
      if (error) throw error;
      cards = [...SEEDS];
    }
    setDbStatus('ok', 'Conectado');
  } catch (e) {
    setDbStatus('err', 'Erro de conexão');
    toast('Erro ao conectar ao banco. Verifique as credenciais.', 'error');
    console.error(e);
  }
  document.getElementById('loadingOverlay').classList.add('hide');
  render();
}

// ─────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────
function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  const q = searchQuery.toLowerCase();
  const filtered = q
    ? cards.filter(c =>
        c.name.toLowerCase().includes(q) ||
        (c.niche||'').toLowerCase().includes(q) ||
        (c.email||'').toLowerCase().includes(q))
    : cards;

  STAGES.forEach(stage => {
    const sc = filtered.filter(c => c.stage === stage.id);
    const col = document.createElement('div');
    col.className = 'column';
    col.dataset.stage = stage.id;
    col.innerHTML = `
      <div class="col-header">
        <div class="col-dot" style="background:${stage.color}"></div>
        <span class="col-title">${stage.icon} ${stage.label}</span>
        <span class="col-count">${sc.length}</span>
      </div>
      <div class="col-body" id="col-${stage.id}"></div>
      <div class="col-add">
        <button onclick="openModal('${stage.id}')">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
          Adicionar
        </button>
      </div>`;
    board.appendChild(col);
    const body = col.querySelector(`#col-${stage.id}`);
    if (sc.length === 0) {
      body.innerHTML = `<div class="empty-state"><span>📭</span>Nenhum canal aqui</div>`;
    } else {
      sc.forEach(card => body.appendChild(buildCard(card)));
    }
    setupDropZone(body, stage.id);
  });
  renderStats();
}

function buildCard(c) {
  const el = document.createElement('div');
  el.className = 'card';
  el.dataset.id = c.id;
  el.draggable = true;

  const initials  = c.name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
  const thumbBg   = strColor(c.name);
  const subsFmt   = c.subs ? fmtSubs(c.subs) : null;
  const prioBadge = c.prio ? `<span class="badge badge-prio-${c.prio}">${{alta:'🔴 Alta',media:'🟡 Média',baixa:'🟢 Baixa'}[c.prio]}</span>` : '';
  const nicheBadge = c.niche ? `<span class="badge badge-niche">${c.niche}</span>` : '';
  const subsBadge  = subsFmt ? `<span class="badge badge-subs">👥 ${subsFmt}</span>` : '';
  const urlTxt     = c.url ? `<a href="${c.url}" target="_blank">${c.url.replace(/https?:\/\//,'').slice(0,28)}…</a>` : '';
  const dateStr    = c.created ? fmtDate(c.created) : '';

  const scriptHtml = c.script ? `
    <div class="card-script">
      <div class="card-script-header">
        <span class="card-script-label">✉️ Script</span>
        <button class="card-script-copy" id="cpbtn-${c.id}" onclick="copyScript('${c.id}',event)">📋 Copiar</button>
      </div>
      <div class="card-script-text" id="sctxt-${c.id}">${esc(c.script)}</div>
      <button class="card-script-expand" onclick="toggleScript('${c.id}',event)">ver completo ↓</button>
    </div>` : '';

  el.innerHTML = `
    <div class="card-top">
      <div class="card-thumb" style="background:${thumbBg};color:#fff">${initials}</div>
      <div class="card-info">
        <div class="card-name" title="${esc(c.name)}">${esc(c.name)}</div>
        ${urlTxt ? `<div class="card-url">${urlTxt}</div>` : ''}
      </div>
      <div class="card-actions">
        <button title="Editar"  onclick="editCard('${c.id}')">✏️</button>
        <button title="Excluir" onclick="deleteCard('${c.id}')">🗑️</button>
      </div>
    </div>
    <div class="card-meta">${nicheBadge}${subsBadge}${prioBadge}</div>
    ${c.notes ? `<div class="card-notes">${esc(c.notes)}</div>` : ''}
    ${scriptHtml}
    ${dateStr ? `<div class="card-date">🕐 ${dateStr}</div>` : ''}`;

  el.addEventListener('dragstart', e => { dragCard = c.id; el.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
  el.addEventListener('dragend',   () => { dragCard = null; el.classList.remove('dragging'); document.querySelectorAll('.drop-placeholder').forEach(p=>p.remove()); });
  return el;
}

function setupDropZone(zone, stageId) {
  zone.addEventListener('dragover', e => {
    e.preventDefault(); e.dataTransfer.dropEffect = 'move';
    if (!zone.querySelector('.drop-placeholder'))
      zone.appendChild(Object.assign(document.createElement('div'), { className:'drop-placeholder' }));
  });
  zone.addEventListener('dragleave', e => {
    if (!zone.contains(e.relatedTarget)) zone.querySelectorAll('.drop-placeholder').forEach(p=>p.remove());
  });
  zone.addEventListener('drop', async e => {
    e.preventDefault(); zone.querySelectorAll('.drop-placeholder').forEach(p=>p.remove());
    if (!dragCard) return;
    const card = cards.find(c => c.id === dragCard);
    if (card && card.stage !== stageId) {
      card.stage = stageId;
      try {
        await dbUpsert(card);
        render();
        toast(`Movido para "${STAGES.find(s=>s.id===stageId).label}"`, 'success');
      } catch(e) { toast('Erro ao mover card', 'error'); console.error(e); }
    }
  });
}

function renderStats() {
  const total    = cards.length;
  const contato  = cards.filter(c=>['email','sample','followup','contact'].includes(c.stage)).length;
  const fechados = cards.filter(c=>c.stage==='fechado').length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-chip">Total <strong>${total}</strong></div>
    <div class="stat-chip">Em contato <strong>${contato}</strong></div>
    <div class="stat-chip">Fechados <strong>${fechados}</strong></div>`;
}

// ─────────────────────────────────────────
//  COPY / TOGGLE SCRIPT
// ─────────────────────────────────────────
function copyScript(id, e) {
  e.stopPropagation();
  const card = cards.find(c => c.id === id);
  if (!card?.script) return;
  navigator.clipboard.writeText(card.script).then(() => {
    const btn = document.getElementById(`cpbtn-${id}`);
    if (btn) { btn.textContent = '✅ Copiado!'; btn.classList.add('copied'); setTimeout(()=>{ btn.textContent='📋 Copiar'; btn.classList.remove('copied'); }, 2000); }
    toast('Script copiado!', 'success');
  });
}

function toggleScript(id, e) {
  e.stopPropagation();
  const el = document.getElementById(`sctxt-${id}`);
  const btn = e.target;
  if (!el) return;
  const exp = el.style.overflow === 'visible';
  el.style.webkitLineClamp = exp ? '4' : 'unset';
  el.style.overflow  = exp ? 'hidden'  : 'visible';
  el.style.display   = exp ? '-webkit-box' : 'block';
  btn.textContent    = exp ? 'ver completo ↓' : 'recolher ↑';
}

// ─────────────────────────────────────────
//  MODAL
// ─────────────────────────────────────────
function openModal(defaultStage = 'lead', editId = null) {
  document.getElementById('editId').value = editId || '';
  document.getElementById('modalTitle').textContent = editId ? 'Editar Canal' : 'Novo Canal';
  document.getElementById('modalIcon').textContent  = editId ? '✏️' : '📺';
  if (editId) {
    const c = cards.find(x => x.id === editId);
    if (c) {
      document.getElementById('fName').value  = c.name   || '';
      document.getElementById('fUrl').value   = c.url    || '';
      document.getElementById('fNiche').value = c.niche  || '';
      document.getElementById('fSubs').value  = c.subs   || '';
      document.getElementById('fEmail').value = c.email  || '';
      document.getElementById('fPrio').value  = c.prio   || '';
      document.getElementById('fStage').value = c.stage  || 'lead';
      document.getElementById('fNotes').value = c.notes  || '';
      document.getElementById('fScript').value= c.script || '';
    }
  } else {
    ['fName','fUrl','fNiche','fSubs','fEmail','fNotes','fScript'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('fPrio').value  = '';
    document.getElementById('fStage').value = defaultStage;
  }
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('fName').focus(), 150);
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function closeModalOutside(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

async function saveCardModal() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { toast('Informe o nome do canal', 'error'); return; }

  const saveBtn = document.getElementById('saveBtn');
  saveBtn.disabled = true; saveBtn.textContent = 'Salvando…';

  const editId = document.getElementById('editId').value;
  const data = {
    name,
    url:    document.getElementById('fUrl').value.trim(),
    niche:  document.getElementById('fNiche').value.trim(),
    subs:   document.getElementById('fSubs').value.trim(),
    email:  document.getElementById('fEmail').value.trim(),
    prio:   document.getElementById('fPrio').value,
    stage:  document.getElementById('fStage').value,
    notes:  document.getElementById('fNotes').value.trim(),
    script: document.getElementById('fScript').value.trim(),
  };

  try {
    if (editId) {
      const idx = cards.findIndex(c => c.id === editId);
      const updated = { ...cards[idx], ...data };
      await dbUpsert(updated);
      if (idx !== -1) cards[idx] = updated;
      toast('Canal atualizado!', 'success');
    } else {
      const newCard = { id: genId(), created: Date.now(), ...data };
      await dbUpsert(newCard);
      cards.push(newCard);
      toast('Canal adicionado!', 'success');
    }
    closeModal();
    render();
  } catch(e) {
    toast('Erro ao salvar. Tente novamente.', 'error');
    console.error(e);
  } finally {
    saveBtn.disabled = false;
    saveBtn.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg> Salvar`;
  }
}

function editCard(id) { openModal('lead', id); }

async function deleteCard(id) {
  if (!confirm('Remover este canal da prospecção?')) return;
  try {
    await dbDelete(id);
    cards = cards.filter(c => c.id !== id);
    render();
    toast('Canal removido', 'info');
  } catch(e) { toast('Erro ao remover', 'error'); console.error(e); }
}

// ─────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────
let toastTimer;
function toast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.className = type;
  document.getElementById('toastMsg').textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ─────────────────────────────────────────
//  UTILS
// ─────────────────────────────────────────
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function strColor(str) { let h=0; for(let i=0;i<str.length;i++) h=str.charCodeAt(i)+((h<<5)-h); return `hsl(${Math.abs(h)%360},55%,38%)`; }
function fmtSubs(v) { const n=parseInt(v.replace(/\D/g,'')); if(isNaN(n))return v; if(n>=1e6)return(n/1e6).toFixed(1).replace('.0','')+'M'; if(n>=1e3)return(n/1e3).toFixed(0)+'K'; return n+''; }
function fmtDate(ts) { return new Date(ts).toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ─────────────────────────────────────────
//  SEARCH + KEYBOARD
// ─────────────────────────────────────────
document.getElementById('search').addEventListener('input', e => { searchQuery = e.target.value; render(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && e.ctrlKey && document.getElementById('modalOverlay').classList.contains('open')) saveCardModal();
});

// ─────────────────────────────────────────
//  START
// ─────────────────────────────────────────
init();
</script>
